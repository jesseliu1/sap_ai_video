<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope of the Pantheon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 3rem;
        }
        .apps {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            min-height: 172px;
            padding: 1.2rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .app-card:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .app-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }
        .app-name {
            font-size: 1rem;
            font-weight: 600;
        }
        .app-desc {
            margin-top: 0.55rem;
            color: rgba(255,255,255,0.7);
            font-size: 0.88rem;
            line-height: 1.35;
        }
        .footer {
            margin-top: 4rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hope of the Pantheon</h1>
        <p class="subtitle">神坛的希望 🦀</p>
        <div class="apps">
            <a href="/edc/" class="app-card">
                <div class="app-icon">🔥</div>
                <div class="app-name">智慧熔炉</div>
                <div class="app-desc">能源与任务协同工作台</div>
            </a>
            <a href="/interview" class="app-card">
                <div class="app-icon">🎤</div>
                <div class="app-name">AI面试官</div>
                <div class="app-desc">结构化面试与练习入口</div>
            </a>
            <a href="/sap-ai/" class="app-card">
                <div class="app-icon">📘</div>
                <div class="app-name">SAP交付AI笔记</div>
                <div class="app-desc">SAP乙方交付流程里的AI增强切入点</div>
            </a>
            <a href="/asns/" class="app-card">
                <div class="app-icon">🧠</div>
                <div class="app-name">AI感知神经系统</div>
                <div class="app-desc">ASNS 宿主神经系统入口</div>
            </a>
            <a href="/meeting-transcript/" class="app-card">
                <div class="app-icon">📝</div>
                <div class="app-name">会议转写</div>
                <div class="app-desc">LiveKit 会议接入、发言归属与原始 transcript 查看</div>
            </a>
        </div>
        <p class="footer">&copy; 2026 hopeofthepantheon.me</p>
    </div>
</body>
</html>
