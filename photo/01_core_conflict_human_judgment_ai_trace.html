<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成熟SAP乙方团队的核心矛盾</title>
<style>
  :root {
    --c-primary: #165DFF;
    --c-text-main: #2B2F36;
    --c-text-sub: #6B7280;
    --c-bg-blue: #E8F3FF;
    --c-border: #E5E7EB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 450px;
    background: #FFFFFF;
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    overflow: hidden;
  }

  .container {
    width: 800px;
    height: 450px;
    padding: 30px 36px 24px;
    position: relative;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
    color: var(--c-text-main);
    letter-spacing: 0.02em;
  }

  .subtitle {
    margin-top: 6px;
    font-size: 11px;
    color: var(--c-text-sub);
  }

  .panels {
    margin-top: 20px;
    display: flex;
    gap: 20px;
  }

  .panel {
    width: 354px;
    height: 286px;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }

  .panel-left {
    background: #F8FAFC;
    border: 1px solid var(--c-border);
  }

  .panel-right {
    background: #F0F7FF;
    border: 1px solid #BFDBFE;
  }

  .panel-label {
    position: absolute;
    top: 14px;
    left: 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 3px 8px;
    border-radius: 3px;
  }

  .label-left {
    background: #E5E7EB;
    color: #4B5563;
    border: 1px solid #D1D5DB;
  }

  .label-right {
    background: var(--c-primary);
    color: #FFFFFF;
  }

  .desk {
    position: absolute;
    left: 22px;
    right: 22px;
    bottom: 80px;
    height: 6px;
    background: #9CA3AF;
    border-radius: 2px;
  }

  .person {
    position: absolute;
    width: 46px;
    height: 84px;
    bottom: 86px;
    left: 35px;
  }

  .head {
    position: absolute;
    top: 0;
    left: 13px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--c-text-main);
  }

  .body {
    position: absolute;
    top: 25px;
    left: 10px;
    width: 26px;
    height: 46px;
    background: var(--c-text-main);
    border-radius: 8px 8px 4px 4px;
  }

  .person-burden {
    transform: rotate(-9deg);
    transform-origin: bottom center;
  }

  .person-right { left: 38px; }

  .doc {
    position: absolute;
    width: 72px;
    height: 36px;
    border-radius: 2px;
    background: #FFFFFF;
    border: 1px solid #9CA3AF;
    color: var(--c-text-main);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: -2px 2px 0 rgba(0,0,0,0.05);
  }

  .doc-red {
    background: #FEF2F2;
    border-color: #FCA5A5;
    color: #991B1B;
  }

  .doc-1 { left: 110px; top: 72px; transform: rotate(-8deg); }
  .doc-2 { left: 164px; top: 93px; transform: rotate(5deg); }
  .doc-3 { left: 96px; top: 118px; transform: rotate(4deg); }
  .doc-4 { left: 178px; top: 134px; transform: rotate(-5deg); }
  .doc-5 { left: 128px; top: 158px; transform: rotate(2deg); }
  .doc-6 { left: 218px; top: 108px; transform: rotate(9deg); }

  .stress-line {
    position: absolute;
    height: 2px;
    background: #FCA5A5;
    border-radius: 2px;
  }

  .stress-1 { width: 24px; left: 82px; top: 78px; transform: rotate(-20deg); }
  .stress-2 { width: 18px; left: 70px; top: 104px; transform: rotate(8deg); }
  .stress-3 { width: 20px; left: 84px; top: 132px; transform: rotate(18deg); }

  .cabinet {
    position: absolute;
    left: 122px;
    top: 68px;
    width: 168px;
    height: 134px;
    border-radius: 4px;
    background: #FFFFFF;
    border: 2px solid var(--c-primary);
    padding: 13px 14px;
  }

  .drawer {
    height: 22px;
    border-radius: 2px;
    background: var(--c-bg-blue);
    color: var(--c-primary);
    border: 1px solid #BFDBFE;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }

  .drawer:last-child { margin-bottom: 0; }

  .ai-mark {
    position: absolute;
    right: 36px;
    top: 58px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--c-primary);
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    border: 3px solid #FFFFFF;
  }

  .ai-main {
    font-size: 13px;
    line-height: 1;
  }

  .ai-sub {
    font-size: 9px;
    line-height: 1.1;
    margin-top: 3px;
  }

  .arrow-small {
    position: absolute;
    left: 92px;
    top: 125px;
    width: 40px;
    height: 2px;
    background: var(--c-primary);
  }

  .arrow-small::after {
    content: "";
    position: absolute;
    right: -1px;
    top: -4px;
    border-left: 7px solid var(--c-primary);
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  .panel-line {
    position: absolute;
    left: 22px;
    right: 22px;
    bottom: 62px;
    height: 1px;
    background: var(--c-border);
  }

  .panel-message {
    position: absolute;
    left: 24px;
    right: 24px;
    bottom: 23px;
    font-size: 18px;
    font-weight: 700;
    color: var(--c-text-main);
    text-align: center;
    letter-spacing: 0.01em;
  }

  .panel-message strong { color: var(--c-primary); }

  .bottom-note {
    position: absolute;
    left: 36px;
    right: 36px;
    bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .note-bar {
    width: 3px;
    height: 28px;
    background: var(--c-primary);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .note-text {
    font-size: 12px;
    color: #4B5563;
    line-height: 1.5;
    font-weight: 500;
  }

  .note-text strong { color: var(--c-primary); }
</style>
</head>
<body>
<div class="container">
  <div class="title">成熟SAP乙方团队的核心矛盾</div>
  <div class="subtitle">不是没有流程，而是流程执行成本太高。</div>

  <div class="panels">
    <div class="panel panel-left">
      <div class="panel-label label-left">传统交付现场</div>
      <div class="person person-burden">
        <div class="head"></div>
        <div class="body"></div>
      </div>
      <div class="stress-line stress-1"></div>
      <div class="stress-line stress-2"></div>
      <div class="stress-line stress-3"></div>
      <div class="doc doc-red doc-1">工单</div>
      <div class="doc doc-red doc-2">RCA</div>
      <div class="doc doc-3">测试截图</div>
      <div class="doc doc-4">变更记录</div>
      <div class="doc doc-5">月报</div>
      <div class="doc doc-6">SLA</div>
      <div class="desk"></div>
      <div class="panel-line"></div>
      <div class="panel-message">流程越成熟，留痕成本越高</div>
    </div>

    <div class="panel panel-right">
      <div class="panel-label label-right">AI增强交付</div>
      <div class="person person-right">
        <div class="head"></div>
        <div class="body"></div>
      </div>
      <div class="arrow-small"></div>
      <div class="cabinet">
        <div class="drawer">工单摘要</div>
        <div class="drawer">RCA草稿</div>
        <div class="drawer">测试证据</div>
        <div class="drawer">知识库</div>
      </div>
      <div class="ai-mark">
        <div class="ai-main">AI</div>
        <div class="ai-sub">整理</div>
      </div>
      <div class="desk"></div>
      <div class="panel-line"></div>
      <div class="panel-message">人做判断，<strong>AI做留痕</strong></div>
    </div>
  </div>

  <div class="bottom-note">
    <div class="note-bar"></div>
    <div class="note-text">AI不是替代顾问，而是把重复整理变成<strong>可复用资产</strong>。</div>
  </div>
</div>
</body>
</html>
